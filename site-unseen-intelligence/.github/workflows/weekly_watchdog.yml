name: Weekly Ownership Watchdog

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6am UTC
  workflow_dispatch:        # Manual trigger anytime

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed subsidiary database
        run: python intelligence/subsidiaries.py

      - name: Scan FERC interconnection queue
        run: python intelligence/ferc_monitor.py
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

      - name: Run ownership watchdog
        run: python intelligence/ownership_watch.py
        env:
          OPENCORPORATES_API_KEY: ${{ secrets.OPENCORPORATES_API_KEY }}

      - name: Compute impact metrics
        run: python intelligence/impact_metrics.py

      - name: Commit updated outputs
        run: |
          git config user.email "sentinel@honorearth.org"
          git config user.name "Watchdog Bot"
          git add output/
          git diff --staged --quiet || (git commit -m "Watchdog scan $(date +%Y-%m-%d)" && git push)
